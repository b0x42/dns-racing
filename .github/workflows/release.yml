name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: dns-racing-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: dns-racing-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dns-racing-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dns-racing-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: dns-racing-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked

      - name: Build (Linux via cross)
        if: contains(matrix.target, 'linux')
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!contains(matrix.target, 'linux')"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: "!contains(matrix.os, 'windows')"
        run: cp target/${{ matrix.target }}/release/dns-racing ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: contains(matrix.os, 'windows')
        run: cp target/${{ matrix.target }}/release/dns-racing.exe ${{ matrix.name }}

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
